<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="60%" stop-color="#00a0cc"/>
      <stop offset="100%" stop-color="#006080"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d0d0d"/>
  <!-- Outer glow -->
  <circle cx="256" cy="240" r="200" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="#00c8ff" stroke-width="3" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="240" r="90" fill="none" stroke="#00c8ff" stroke-width="2" opacity="0.25"/>
  <!-- Core orb -->
  <circle cx="256" cy="240" r="55" fill="url(#orb)"/>
  <!-- Core highlight -->
  <circle cx="245" cy="225" r="18" fill="#ffffff" opacity="0.15"/>
  <!-- JARVIS text -->
  <text x="256" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="56" letter-spacing="12" fill="#00c8ff">JARVIS</text>
</svg>
